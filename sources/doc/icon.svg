<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innershadow">
      <feDropShadow dx="0" dy="6" stdDeviation="20"
                    flood-color="#0D47A1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fond arrondi dégradé bleu -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Reflet subtil en haut -->
  <ellipse cx="420" cy="200" rx="340" ry="160"
           fill="white" opacity="0.07"/>

  <!-- Éclair — légère ombre portée -->
  <path d="M 592,108 L 342,532 L 492,532 L 428,912 L 668,478 L 518,478 Z"
        fill="#1565C0" opacity="0.25" transform="translate(6,10)"/>

  <!-- Éclair — corps principal avec lueur -->
  <path d="M 592,108 L 342,532 L 492,532 L 428,912 L 668,478 L 518,478 Z"
        fill="url(#bolt)" filter="url(#glow)"/>
</svg>
