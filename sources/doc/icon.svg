<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="key_grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22"
                    flood-color="#0D47A1" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Fond arrondi dégradé bleu -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Reflet subtil en haut -->
  <ellipse cx="420" cy="190" rx="340" ry="155" fill="white" opacity="0.07"/>

  <!-- Clé (ombre portée) -->
  <g transform="translate(10,64)" opacity="0.28">
    <circle cx="512" cy="362" r="190" fill="#0D47A1"/>
    <rect x="476" y="362" width="72" height="490" rx="36" fill="#0D47A1"/>
    <rect x="548" y="652" width="78" height="60" rx="12" fill="#0D47A1"/>
    <rect x="548" y="754" width="58" height="60" rx="12" fill="#0D47A1"/>
  </g>

  <!-- Clé — anneau + tige + dents -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="362" r="190" fill="url(#key_grad)" filter="url(#glow)"/>
    <rect x="476" y="362" width="72" height="490" rx="36" fill="url(#key_grad)"/>
    <rect x="548" y="652" width="78" height="60" rx="12" fill="url(#key_grad)"/>
    <rect x="548" y="754" width="58" height="60" rx="12" fill="url(#key_grad)"/>
  </g>

  <!-- Trou de serrure dans l'anneau -->
  <circle cx="512" cy="320" r="64" fill="#1565C0"/>
  <polygon points="474,378 550,378 512,498" fill="#1565C0"/>

  <!-- Filet de brillance sur l'anneau -->
  <circle cx="512" cy="362" r="190" fill="none" stroke="white" stroke-width="5" opacity="0.25"/>
</svg>
